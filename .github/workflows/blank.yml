name: Pipeline CI/CD Pygame

on:
  push:
    branches: [ "master", "staging" ]
  pull_request:
    branches: [ "master", "staging" ]

jobs:
  testes:
    name: Rodar Testes (Pygame + Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Dependências do Sistema (SDL)
        # O Pygame precisa dessas bibliotecas do sistema para funcionar no Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libsdl2-dev libportmidi-dev xvfb

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install pygame pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar Testes com Display Virtual (XVFB)
        # O xvfb-run simula uma tela para o Pygame não dar erro de "Video system not initialized"
        run: |
          xvfb-run pytest

  deploy-staging:
    name: Deploy para Staging
    needs: testes
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Simular Deploy Staging
        run: echo "Subindo versão de teste do jogo..."

  deploy-producao:
    name: Deploy para Produção
    needs: testes
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Simular Deploy Produção
        run: echo "Gerando Build Final do Jogo!"
