name: Tropico Game CI

on:
  push:
    branches: [ "staging" ]
  pull_request:
    branches: [ "master" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Ou a versão que você utiliza
          cache: 'pip' # Faz o cache das dependências para rodar mais rápido

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest # Ferramentas de qualidade

      - name: Verificar Lint (Flake8)
        run: |
          # Para o build se houver erros de sintaxe Python ou símbolos indefinidos
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avisos amigáveis (ajuste conforme sua preferência)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Rodar Testes (Pytest)
        run: |
          pytest
