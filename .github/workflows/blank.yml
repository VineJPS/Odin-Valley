name: Pipeline CI/CD Pygame

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  testes:
    name: Rodar Testes (Pygame + Pytest)
    runs-on: ubuntu-latest
    # Define o tempo máximo de execução para este job específico
    timeout-minutes: 20
    
    env:
      SDL_VIDEODRIVER: "dummy"
      SDL_AUDIODRIVER: "dummy"
      PYGAME_HIDE_SUPPORT_PROMPT: "hide"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Dependências do Sistema (SDL)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libsdl2-dev libportmidi-dev xvfb

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install pygame pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar Testes com Display Virtual (XVFB)
        run: |
          xvfb-run -a pytest

  deploy-staging:
    name: Deploy para Staging
    needs: testes
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Deploys costumam ser mais rápidos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Simular Deploy Staging
        run: echo "Subindo versão de teste do jogo..."

  deploy-producao:
    name: Deploy para Produção
    needs: testes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Simular Deploy Produção
        run: echo "Gerando Build Final do Jogo!"
